<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Medica</title>
</head>
<body>
    <h1>Ficha Medica</h1>
    <p>
        <label for="nome">Seu nome</label><br>
        <input type="text" id="nome" name="nome" required>
    </p>

    <p>
        <label for="data de nascimento">data de nascimento:</label><br>
        <input type="date" id="data de nascimento" name="data de nascimento" required>
    </p>

    <p>Convenio</p>
       
    <p>
        <input type="radio" id="convenio" name="convenio" required>
        <label for="convenio">Sim</label>
        <input type="radio" id="convenio" name="convenio" required>
        <label for="convenio">Não</label>
    </p> 
    
    <p>
        <label for="convenio">Se sim qual?</label><br>
        <input type="text" id="convenio" name="convenio" >
    </p>

    <p>
       <label for="sanguineo">Seu tipo sanguineo?</label><br>
       <input type="text" id="sanguineo" name="sanguineo" required>
    </p>
   
    <p>Fumante</p>

    <p>
        <Input type="radio" id="fumante" name="fumante" required>
        <label for="fumante">Sim</label>
        <input type="radio" id="fumante" name="fumante" required>
        <label for="fumante">Não</label>
    </p>

    <p>Possui alergia?</p>

    <p>
        <Input type="radio" id="alergia" name="alergia" required>
        <label for="alergia">Sim</label>
        <input type="radio" id="alergia" name="alergia" required>
        <label for="alergia">Não</label>
    </p>

    <p>
        <label for="alergia">Se sim qual?</label><br>
        <input type="text" id="alergia" name="alergia" >
    </p>

    <p>Toma algum medicamento?</p>
    <p>
        <Input type="radio" id="medicamento" name="medicamento" required>
        <label for="medicamento">Sim</label>
        <input type="radio" id="medicamento" name="medicamento" required>
        <label for="medicamento">Não</label>
    </p>
    <p>
        <label for="medicamento">Se sim qual?</label><br>
        <input type="text" id="alergia" name="alergia" >
    </p>
    
    <p>Consome alguma bebeida alcoolica?</p>
    <p>
        <Input type="radio" id="alcool" name="alcool" required>
        <label for="alcool">Sim</label>
        <input type="radio" id="alcool" name="alcool" required>
        <label for="alcool">Não</label>
    </p> 

    <p>
        <label for="Contato">Contato</label>
        <input type="tel" id="contato" name="contato" required>
    </p>


    <button>Enviar</button> 

</body>
</html>
