<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
     <h1>Formulario</h1>

    <p>
        <label for="nome">Seu nome</label><br>
        <input type="text" id="nome" name="nome" required>
    </p>

    <p>
        <label for="idade">Sua idade:</label><br>
        <input type="number" id="idade" name="idade" required>
    </p>

    <p>
        <label for="data de nascimento">data de nascimento:</label><br>
        <input type="date" id="data de nascimento" name="data de nascimento" required>
    </p>

    <p>
        <label for="cidade natal">Sua cidade natal:</label><br>
        <input type="text" id="cidade natal" name="cidade natal" required>
    </p>

    <p>
       <label for="Curso">Curso:</label><br>
       <input type="text" id="Curso" name="Curso" required>
   </p>

   <p>
       <label for="Cidade atual">Cidade que você mora</label><br>
       <input type="text" id="Cidade atual" name="Cidade atual" required>
   </p>

   <button>Enviar</button>
</body>
</html>
